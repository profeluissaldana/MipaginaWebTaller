{% extends 'base.html' %}
{% block title %}Editar Alumno - Taller{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 p-4 bg-white">
            <h3 class="text-primary fw-bold mb-3">✏️ Modificar Registro de Alumno</h3>
            <p class="text-muted small">Actualizá los datos de legajo o reasigná la comisión del estudiante.</p>
            <hr>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Apellido</label>
                    <input type="text" name="apellido" class="form-control" value="{{ alumno.apellido }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Nombre</label>
                    <input type="text" name="nombre" class="form-control" value="{{ alumno.nombre }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">DNI</label>
                    <input type="text" name="dni" class="form-control" value="{{ alumno.dni }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Email Institucional</label>
                    <input type="email" name="email" class="form-control" value="{{ alumno.email }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Comisión Asignada (Turno)</label>
                    <select name="turno_id" class="form-select" required>
                        {% for t in turnos %}
                        <option value="{{ t.id }}" {% if alumno.turno_id == t.id %}selected{% endif %}>{{ t.nombre_grupo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Observaciones de Cursada / Subgrupo</label>
                    <textarea name="observaciones_generales" class="form-control" rows="2">{{ alumno.observaciones_generales or '' }}</textarea>
                </div>
                <div class="d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-success fw-bold px-4">Guardar Cambios</button>
                    <a href="{{ url_for('ver_grupos', turno_id=alumno.turno_id) }}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
