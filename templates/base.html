<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Taller de Computación{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('inicio') }}">💻 Taller Computación</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('ofimatica') }}">Ofimática</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('visualStudioCode') }}">VS Code</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('htmlCss') }}">HTML & CSS</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('javaScript') }}">JavaScript</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('gitGitHub') }}">Git & GitHub</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('frameworkFlask') }}">Flask</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('arduinoUno') }}">Arduino</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <small>&copy; 2026 Asignatura: Taller de Computación | <strong>Prof. Luis Saldaña</strong>. Todos los derechos reservados.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <script src="{{ url_for('static', filename='js/funciones.js') }}"></script>
</body>
</html>
